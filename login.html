<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | College Bus Tracking</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>

<body class="login-screen">

    <div class="login-card fade-in">
        <div class="login-icon">
            <i class="fas fa-bus"></i>
        </div>
        <h1 style="font-size: 28px; font-weight: 800; margin-bottom: 8px;">Admin Login</h1>
        <p style="color: var(--text-secondary); margin-bottom: 40px;">College Bus Tracking System</p>

        <form id="login-form">
            <div style="text-align: left; margin-bottom: 20px;">
                <label
                    style="display: block; margin-bottom: 10px; font-weight: 600; font-size: 14px; color: var(--text-secondary);">Email
                    Address</label>
                <input type="email" id="email" class="search-bar" style="width: 100%;" placeholder="admin@example.com"
                    required>
            </div>

            <div style="text-align: left; margin-bottom: 30px;">
                <label
                    style="display: block; margin-bottom: 10px; font-weight: 600; font-size: 14px; color: var(--text-secondary);">Password</label>
                <input type="password" id="password" class="search-bar" style="width: 100%;" placeholder="••••••••"
                    required>
            </div>

            <button type="submit" class="btn-primary"
                style="width: 100%; justify-content: center; padding: 16px; font-size: 16px;">
                ACCESS DASHBOARD
            </button>
        </form>

        <div id="login-error"
            style="display: none; color: var(--accent-rose); margin-top: 20px; font-weight: 600; font-size: 14px;">
            <i class="fas fa-exclamation-circle"></i> Invalid credentials provided.
        </div>
    </div>

    <script src="js/login.js"></script>
</body>

</html>
