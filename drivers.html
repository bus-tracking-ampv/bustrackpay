<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Personnel | Admin Panel</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <script>
        if (localStorage.getItem('admin_logged_in') !== 'true') {
            window.location.href = 'login.html';
        }
    </script>
</head>

<body>
    <div id="global-loader" class="loader-overlay">
        <div class="spinner"></div>
    </div>

    <div class="admin-wrapper">
        <aside class="sidebar">
            <div class="brand">
                <div class="brand-icon"><i class="fas fa-bus"></i></div>
                <span class="brand-name">BUS TRACK</span>
            </div>
            <nav>
                <ul class="nav-menu">
                    <li class="nav-item"><a href="index.html" class="nav-link"><i
                                class="fas fa-grid-2"></i><span>Overview</span></a></li>
                    <li class="nav-item"><a href="drivers.html" class="nav-link active"><i
                                class="fas fa-id-badge"></i><span>Personnel</span></a></li>
                    <li class="nav-item"><a href="students.html" class="nav-link"><i
                                class="fas fa-user-graduate"></i><span>Students</span></a></li>
                    <li class="nav-item"><a href="fees.html" class="nav-link"><i
                                class="fas fa-money-check-alt"></i><span>Fees</span></a></li>
                    <li class="nav-item"><a href="routes.html" class="nav-link"><i class="fas fa-route"></i><span>Fleet
                                Routes</span></a></li>
                    <li class="nav-item"><a href="tracking.html" class="nav-link"><i
                                class="fas fa-satellite-dish"></i><span>Live Monitor</span></a></li>
                    <li class="nav-item"><a href="notifications.html" class="nav-link"><i
                                class="fas fa-bullhorn"></i><span>Broadcasts</span></a></li>
                </ul>
                <ul class="nav-menu" style="margin-top: 100px;">
                    <li class="nav-item"><a href="login.html" class="nav-link" style="color: var(--accent-rose);"><i
                                class="fas fa-power-off"></i><span>Logout</span></a></li>
                </ul>
            </nav>
        </aside>

        <main class="main-content">
            <header class="header">
                <div class="page-title">
                    <h1>Personnel Management</h1>
                    <p>Driver Registry &amp; Credentials</p>
                </div>
                <button class="btn-primary" id="btn-add-driver">
                    <i class="fas fa-plus"></i> Add New Driver
                </button>
            </header>

            <div class="data-container fade-in">
                <div class="data-header">
                    <h2>Verified Drivers</h2>
                    <input type="text" class="search-bar" id="search-driver" placeholder="Search by name or ID...">
                </div>
                <table>
                    <thead>
                        <tr>
                            <th>Driver</th>
                            <th>Driver ID</th>
                            <th>License No</th>
                            <th>Bus No</th>
                            <th>Contact</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="driver-table-body"></tbody>
                </table>
            </div>
        </main>
    </div>

    <!-- Modal -->
    <div id="driver-modal"
        style="display: none; position: fixed; inset: 0; background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(8px); z-index: 1000; place-items: center; padding: 20px;">
        <div class="data-container fade-in" style="width: 100%; max-width: 500px; background: white;">
            <div class="data-header">
                <h2 id="modal-title" style="font-size: 24px; font-weight: 800;">Add Driver</h2>
                <button onclick="closeModal()"
                    style="background: var(--bg-light); border: none; width: 40px; height: 40px; border-radius: 12px; color: var(--text-primary); cursor: pointer;"><i
                        class="fas fa-times"></i></button>
            </div>
            <form id="driver-form">
                <input type="hidden" id="edit-id">
                <div style="margin-bottom: 20px;">
                    <label
                        style="display: block; margin-bottom: 10px; font-weight: 600; color: var(--text-secondary);">Full
                        Name</label>
                    <input type="text" id="driver-name" class="search-bar" style="width: 100%;" required>
                </div>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px;">
                    <div>
                        <label
                            style="display: block; margin-bottom: 10px; font-weight: 600; color: var(--text-secondary);">Driver
                            ID (User ID)</label>
                        <input type="text" id="driver-id" class="search-bar" style="width: 100%;" required>
                    </div>
                    <div>
                        <label
                            style="display: block; margin-bottom: 10px; font-weight: 600; color: var(--text-secondary);">Password</label>
                        <input type="text" id="driver-pass" class="search-bar" style="width: 100%;" required>
                    </div>
                </div>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 30px;">
                    <div>
                        <label
                            style="display: block; margin-bottom: 10px; font-weight: 600; color: var(--text-secondary);">License
                            Number</label>
                        <input type="text" id="driver-license" class="search-bar" style="width: 100%;" required>
                    </div>
                    <div>
                        <label
                            style="display: block; margin-bottom: 10px; font-weight: 600; color: var(--text-secondary);">Assigned
                            Bus</label>
                        <input type="text" id="driver-bus" class="search-bar" style="width: 100%;" required>
                    </div>
                </div>
                <button type="submit" class="btn-primary" style="width: 100%; justify-content: center; padding: 16px;">
                    CONFIRM SAVING DATA
                </button>
            </form>
        </div>
    </div>

    <script type="module" src="js/drivers.js"></script>
    <script>function closeModal() { document.getElementById('driver-modal').style.display = 'none'; }</script>
</body>

</html>
