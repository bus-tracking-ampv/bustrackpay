<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Route Configuration | Admin Panel</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <script>
        if (localStorage.getItem('admin_logged_in') !== 'true') {
            window.location.href = 'login.html';
        }
    </script>
</head>

<body>
    <div id="global-loader" class="loader-overlay">
        <div class="spinner"></div>
    </div>

    <div class="admin-wrapper">
        <aside class="sidebar">
            <div class="brand">
                <div class="brand-icon"><i class="fas fa-bus"></i></div>
                <span class="brand-name">BUS TRACK</span>
            </div>
            <nav>
                <ul class="nav-menu">
                    <li class="nav-item"><a href="index.html" class="nav-link"><i
                                class="fas fa-grid-2"></i><span>Overview</span></a></li>
                    <li class="nav-item"><a href="drivers.html" class="nav-link"><i
                                class="fas fa-id-badge"></i><span>Personnel</span></a></li>
                    <li class="nav-item"><a href="students.html" class="nav-link"><i
                                class="fas fa-user-graduate"></i><span>Students</span></a></li>
                    <li class="nav-item"><a href="fees.html" class="nav-link"><i
                                class="fas fa-money-check-alt"></i><span>Fees</span></a></li>
                    <li class="nav-item"><a href="routes.html" class="nav-link active"><i
                                class="fas fa-route"></i><span>Fleet Routes</span></a></li>
                    <li class="nav-item"><a href="tracking.html" class="nav-link"><i
                                class="fas fa-satellite-dish"></i><span>Live Monitor</span></a></li>
                    <li class="nav-item"><a href="notifications.html" class="nav-link"><i
                                class="fas fa-bullhorn"></i><span>Broadcasts</span></a></li>
                </ul>
                <ul class="nav-menu" style="margin-top: 100px;">
                    <li class="nav-item"><a href="login.html" class="nav-link" style="color: var(--accent-rose);"><i
                                class="fas fa-power-off"></i><span>Logout</span></a></li>
                </ul>
            </nav>
        </aside>

        <main class="main-content">
            <header class="header">
                <div class="page-title">
                    <h1>System Routes</h1>
                    <p>Fleet Navigation Manifests</p>
                </div>
                <button class="btn-primary" id="btn-add-route">
                    <i class="fas fa-plus"></i> Define Route
                </button>
            </header>

            <div class="data-container fade-in">
                <div class="data-header">
                    <h2>Fleet Manifests</h2>
                    <input type="text" class="search-bar" id="search-route" placeholder="Search route name...">
                </div>
                <table>
                    <thead>
                        <tr>
                            <th>Route Name</th>
                            <th>Bus No</th>
                            <th>Total Stops</th>
                            <th>Driver</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="route-table-body"></tbody>
                </table>
            </div>
        </main>
    </div>

    <!-- Modal -->
    <div id="route-modal"
        style="display: none; position: fixed; inset: 0; background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(8px); z-index: 1000; place-items: center; padding: 20px;">
        <div class="data-container fade-in" style="width: 100%; max-width: 600px; background: white;">
            <div class="data-header">
                <h2 id="modal-title" style="font-size: 24px; font-weight: 800;">Define Route</h2>
                <button onclick="closeModal()"
                    style="background: var(--bg-light); border: none; width: 40px; height: 40px; border-radius: 12px; color: var(--text-primary); cursor: pointer;"><i
                        class="fas fa-times"></i></button>
            </div>
            <form id="route-form">
                <input type="hidden" id="edit-id">
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px;">
                    <div>
                        <label
                            style="display: block; margin-bottom: 10px; font-weight: 600; color: var(--text-secondary);">Route
                            Name</label>
                        <input type="text" id="route-name" class="search-bar" style="width: 100%;" required>
                    </div>
                    <div>
                        <label
                            style="display: block; margin-bottom: 10px; font-weight: 600; color: var(--text-secondary);">Bus
                            Assigned</label>
                        <input type="text" id="route-bus" class="search-bar" style="width: 100%;" required>
                    </div>
                </div>

                <!-- Map Preview with Instructions -->
                <div style="position: relative; margin-bottom: 20px;">
                    <div id="map-instruction" class="map-instruction-banner">
                        <span><i class="fas fa-mouse-pointer"></i> <span id="instruction-text">Pick Source Point on
                                Map</span></span>
                        <span id="step-badge" class="selection-badge badge-source">Step 1: Source</span>
                    </div>
                    <div id="modal-map"
                        style="width: 100%; height: 300px; border-radius: 20px; border: 1px solid var(--border-color); box-shadow: inset 0 2px 10px rgba(0,0,0,0.05);">
                    </div>
                </div>

                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px;">
                    <div id="source-box" class="step-box active">
                        <label
                            style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; font-weight: 700; font-size: 13px; color: var(--text-primary);">
                            1. Source
                            <button type="button" onclick="setPickingMode('source')" class="coord-reset-btn"
                                title="Re-pick Source"><i class="fas fa-undo"></i></button>
                        </label>
                        <input type="text" id="source-coords" class="search-bar"
                            style="width: 100%; font-size: 12px; height: 45px;" placeholder="Click map for Source"
                            required readonly>
                    </div>
                    <div id="dest-box" class="step-box">
                        <label
                            style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; font-weight: 700; font-size: 13px; color: var(--text-primary);">
                            2. Destination
                            <button type="button" onclick="setPickingMode('dest')" class="coord-reset-btn"
                                title="Re-pick Destination"><i class="fas fa-undo"></i></button>
                        </label>
                        <input type="text" id="dest-coords" class="search-bar"
                            style="width: 100%; font-size: 12px; height: 45px;" placeholder="Click map for Destination"
                            required readonly>
                    </div>
                </div>

                <div id="stops-container"
                    style="max-height: 200px; overflow-y: auto; margin-bottom: 20px; background: #f8fafc; padding: 15px; border-radius: 16px;">
                    <label
                        style="display: block; margin-bottom: 15px; font-weight: 700; color: var(--text-primary); display: flex; justify-content: space-between; align-items: center;">
                        Route Waypoints
                        <button type="button" id="btn-trigger-picker" onclick="startPickingStop()" class="btn-primary"
                            style="padding: 8px 16px; font-size: 11px; height: auto;">
                            <i class="fas fa-plus-circle"></i> ADD NEW STOP
                        </button>
                    </label>
                    <div id="stops-list"></div>
                </div>

                <button type="submit" class="btn-primary" style="width: 100%; justify-content: center; padding: 16px;">
                    SAVE SYSTEM CONFIG
                </button>
            </form>
        </div>
    </div>

    <script type="module" src="js/routes.js"></script>
    <script>function closeModal() { document.getElementById('route-modal').style.display = 'none'; }</script>
</body>

</html>
